<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 20px;
        font-family: Arial, Helvetica, sans-serif;
      }
      ul {
        color: purple;
      }
      h1 {
        background-color: #fa8070;
        border: 5px solid navy;
        padding: 12px;
      }
      h3 {
        background-color: #aad9dc;
        border: 12px solid rgb(32, 32, 234);
        padding: 18px;
      }
      #lit {
        background-color: #fcfc00;
      }
    </style>
  </head>

  <body>
    <h1><b> Box Model</b></h1>
    <h3>
      Every element on the page has its own box , which can be styled using CSS
    </h3>
    <br />
    <h3>From this inside out:</h3>
    <ul>
      <li id="lit">content</li>
      <li>padding</li>
      <li id="lit">border</li>
      <li>margin</li>
    </ul>
    <h2><b>Background</b></h2>
    <h3>
      Keep in the mind
      <i style="background-color: white; padding: 3px; border: 5px solid"
        >background</i
      >
      will cover the content and the padding
    </h3>
  </body>
</html>
