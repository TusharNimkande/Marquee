<!doctype html>
<html>
  <head>
    <title>Student registration form</title>
    <style>
      table {
        background-color: rgb(176, 120, 227);
      }
    </style>
  </head>
  <body>
    <h2>STUDENT REGISTRATION FORM</h2>
    <hr>
    <form>
    <table>
      <tr>
        <td>
          <label for="username">First Name </label>
          <input type="text" name="username" id="username" />
        </td>
      </tr>
      <tr>
        <td>
          <label for="lname"> LastName </label>
          <input type="text" name="username" id="lname" />
        </td>
      </tr>
      <tr>
        <td>
          <label for="dob"> Date of birth </label>
          <input type="date" name="username" id="dob" />
        </td>
      </tr>
      <tr>
        <td>
          <label for="mail"> G mail </label>
          <input type="email" name="mail id" id="mail" />
        </td>
      </tr>
      <tr>
        <td>
          <label for="num"> Mobile Number </label>
          <input type="text" name=Mobile_Number" id="num" />
        </td>
      </tr>
      <tr>
        <td>Gender:
        
         <input
                type = "radio"
                name = "Gendr" 
                id ="Gendr"
                value = "Gendr_male"/>
                <label for = "Gendr">Male</label>
         <input
                type = "radio"
                name = "Gendr" 
                id ="Gendr"
                value = "Gendr_Female"/>
                <label for = "Gendr">Female</label>
        </td>
      </tr>
      <tr>
        <td colspan=""> 
            <label for = addr>Adress :</label>
            <input type = "text" id = "addr" name = "Adress"/>
        </td>
      </tr>
    </table>
    </form>
  </body>
</html>
